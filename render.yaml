services:
  - type: web
    name: vixsrc-extractor
    env: python
    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium
      playwright install-deps
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/playwright_bins
    plan: free
